# =============================================================================
# 大企業向け コーポレートガバナンス審査観点（デフォルト）
# =============================================================================
# 日本の大企業を想定した標準的な審査観点。
# ISMS (ISO 27001)、個人情報保護法、J-SOX、BCPガイドライン等を参考に構成。
# -----------------------------------------------------------------------------

criteria:
  # ===========================================================================
  # 1. 情報セキュリティ
  # ===========================================================================
  - id: C001
    category: "情報セキュリティ"
    name: "パスワードポリシーの策定と運用"
    description: >
      パスワードの最低文字数（12文字以上推奨）、複雑性要件、有効期限、
      再利用禁止ルールが文書化され、全社的に適用されているか確認する。
      多要素認証（MFA）の導入状況も評価対象とする。
    severity: "high"

  - id: C002
    category: "情報セキュリティ"
    name: "アクセス制御と権限管理"
    description: >
      最小権限の原則に基づき、システム・データへのアクセス権限が職務に応じて
      付与・レビューされているか確認する。特権アカウントの管理、
      退職者・異動者のアクセス権即時削除プロセスを含む。
    severity: "high"

  - id: C003
    category: "情報セキュリティ"
    name: "データ暗号化"
    description: >
      機密データの保存時暗号化（AES-256等）および通信時暗号化（TLS 1.2以上）が
      実施されているか確認する。暗号鍵の管理手順（生成・保管・更新・廃棄）が
      文書化されていることも対象とする。
    severity: "high"

  - id: C004
    category: "情報セキュリティ"
    name: "セキュリティインシデント対応"
    description: >
      インシデント対応手順書が整備され、検知・初動対応・影響範囲特定・
      復旧・再発防止の各フェーズが定義されているか確認する。
      対応体制（CSIRT等）の設置、連絡先一覧の最新性、
      年1回以上の訓練実施実績を評価する。
    severity: "high"

  - id: C005
    category: "情報セキュリティ"
    name: "ログ管理と監視"
    description: >
      重要システムのアクセスログ・操作ログが取得・保管され、
      定期的なレビューおよび異常検知の仕組みが機能しているか確認する。
      ログの保存期間（最低1年以上推奨）、改ざん防止策を評価対象とする。
    severity: "medium"

  # ===========================================================================
  # 2. 個人情報保護
  # ===========================================================================
  - id: C006
    category: "個人情報保護"
    name: "個人情報の特定と台帳管理"
    description: >
      取り扱う個人情報の種類・件数・保管場所・管理責任者が台帳として
      整備・更新されているか確認する。要配慮個人情報、個人関連情報、
      仮名加工情報・匿名加工情報の区分管理も対象とする。
    severity: "high"

  - id: C007
    category: "個人情報保護"
    name: "取得・利用目的の明示と同意取得"
    description: >
      個人情報の取得時に利用目的が具体的かつ明確に本人へ通知・公表されているか
      確認する。目的外利用の禁止ルール、利用目的変更時の再同意取得プロセスを
      評価する。プライバシーポリシーの公開内容と実態の整合性も対象とする。
    severity: "high"

  - id: C008
    category: "個人情報保護"
    name: "第三者提供と越境移転の管理"
    description: >
      個人情報の第三者提供にあたり、本人同意の取得または法定例外事由の
      適用判断が適切に行われているか確認する。外国にある第三者への提供時の
      情報提供義務、提供記録・受領記録の作成・保管も評価対象とする。
    severity: "high"

  - id: C009
    category: "個人情報保護"
    name: "委託先における個人情報管理"
    description: >
      個人情報の取扱いを委託する場合に、委託先の選定基準、
      契約における安全管理措置の義務付け、定期的な監督・監査が
      実施されているか確認する。再委託の承認プロセスも対象とする。
    severity: "high"

  - id: C010
    category: "個人情報保護"
    name: "漏洩等発生時の対応手順"
    description: >
      個人データの漏洩・滅失・毀損が発生した場合の報告フロー
      （個人情報保護委員会への報告、本人への通知）が手順化されているか確認する。
      報告期限（速報72時間以内、確報30日以内）の遵守体制を評価する。
    severity: "high"

  # ===========================================================================
  # 3. コンプライアンス
  # ===========================================================================
  - id: C011
    category: "コンプライアンス"
    name: "法令遵守体制の整備"
    description: >
      コンプライアンス推進の責任者・組織体制が明確に定められ、
      関連法令（会社法、金商法、独禁法、下請法等）の特定・モニタリングが
      定期的に行われているか確認する。コンプライアンス委員会の
      設置・運営状況も評価対象とする。
    severity: "high"

  - id: C012
    category: "コンプライアンス"
    name: "内部通報制度（公益通報者保護）"
    description: >
      公益通報者保護法に基づく内部通報窓口が設置され、通報者保護措置、
      匿名通報の受付体制、通報後の調査・是正プロセスが機能しているか確認する。
      外部窓口（弁護士等）の設置、従業員への周知状況も評価する。
    severity: "high"

  - id: C013
    category: "コンプライアンス"
    name: "懲戒規定と違反時対応"
    description: >
      コンプライアンス違反に対する懲戒基準が就業規則等で明文化され、
      違反の調査・認定・処分プロセスが公正かつ透明に運用されているか確認する。
      処分の記録管理、再発防止策の実施状況も対象とする。
    severity: "medium"

  - id: C014
    category: "コンプライアンス"
    name: "利益相反管理"
    description: >
      役員・従業員の利益相反行為（競業取引、関連当事者取引等）を
      特定・申告・承認するプロセスが整備されているか確認する。
      取締役会への報告義務、利益相反ポリシーの周知状況を評価する。
    severity: "medium"

  - id: C015
    category: "コンプライアンス"
    name: "教育・研修の実施"
    description: >
      全従業員を対象としたコンプライアンス研修が年1回以上実施され、
      受講率・理解度が管理されているか確認する。役員向け研修、
      新入社員研修、職種別の専門研修の実施状況も評価対象とする。
    severity: "medium"

  # ===========================================================================
  # 4. BCP / リスク管理
  # ===========================================================================
  - id: C016
    category: "BCP / リスク管理"
    name: "事業継続計画（BCP）の策定"
    description: >
      自然災害・パンデミック・サイバー攻撃等の重大リスクに対する
      事業継続計画が策定され、経営層の承認を得ているか確認する。
      目標復旧時間（RTO）、目標復旧時点（RPO）の設定、
      重要業務の優先順位付けが明確であることを評価する。
    severity: "high"

  - id: C017
    category: "BCP / リスク管理"
    name: "リスクアセスメントの実施"
    description: >
      事業に影響を与えるリスクの洗い出し・評価・対応策の策定が
      体系的に行われているか確認する。リスクマップの作成、
      リスクオーナーの任命、残留リスクの受容判断プロセスを評価する。
      年1回以上の見直しが実施されていることも対象とする。
    severity: "high"

  - id: C018
    category: "BCP / リスク管理"
    name: "訓練・演習と計画の見直し"
    description: >
      BCP/DRの実効性を検証するための訓練・演習が年1回以上実施され、
      訓練結果に基づく改善事項が計画に反映されているか確認する。
      机上演習（テーブルトップ）および実地訓練の実施記録を評価する。
    severity: "medium"

  - id: C019
    category: "BCP / リスク管理"
    name: "IT災害復旧（DR）体制"
    description: >
      重要システムのバックアップ取得（頻度・保管場所・復元テスト）、
      災害時の代替環境（DR サイト・クラウド DR）が整備されているか確認する。
      バックアップからの復旧手順書と復旧テストの実施実績を評価する。
    severity: "high"

  # ===========================================================================
  # 5. 文書管理
  # ===========================================================================
  - id: C020
    category: "文書管理"
    name: "版管理と変更履歴"
    description: >
      規程・手順書等の重要文書について、版番号の付与、変更履歴の記録、
      最新版の識別が確実に行われているか確認する。
      旧版の管理（誤使用防止）、電子文書管理システムの導入状況も評価する。
    severity: "medium"

  - id: C021
    category: "文書管理"
    name: "承認プロセスと権限"
    description: >
      文書の作成・改訂・廃止に対する承認権限が職位・役割に応じて
      定められ、承認記録（電子承認・押印等）が残されているか確認する。
      承認ワークフローの運用実態と規定の整合性を評価する。
    severity: "medium"

  - id: C022
    category: "文書管理"
    name: "保存期間と法定保存要件"
    description: >
      文書種別ごとの保存期間が法令要件（会社法10年、税法7年等）を
      満たす形で定められ、保存期間管理台帳が整備されているか確認する。
      電子帳簿保存法への対応状況も評価対象とする。
    severity: "medium"

  - id: C023
    category: "文書管理"
    name: "廃棄ルールと実施記録"
    description: >
      保存期間を経過した文書の廃棄手順（シュレッダー、データ消去等）が
      定められ、廃棄実施記録（日時・対象・方法・実施者）が保管されているか
      確認する。機密文書の廃棄方法の適切性も評価する。
    severity: "low"

  # ===========================================================================
  # 6. 委託先管理
  # ===========================================================================
  - id: C024
    category: "委託先管理"
    name: "委託先の選定基準と評価"
    description: >
      委託先の選定にあたり、技術力・財務健全性・セキュリティ体制・
      コンプライアンス状況等の評価基準が明文化され、選定プロセスが
      適切に運用されているか確認する。定期的な再評価の実施も対象とする。
    severity: "high"

  - id: C025
    category: "委託先管理"
    name: "契約要件（SLA・セキュリティ条項）"
    description: >
      委託契約に機密保持義務、セキュリティ要件、SLA（サービスレベル）、
      損害賠償条項、契約解除条件が含まれているか確認する。
      個人情報取扱いの委託の場合は安全管理措置の具体的内容が
      契約に明記されていることも評価する。
    severity: "high"

  - id: C026
    category: "委託先管理"
    name: "監査権と定期モニタリング"
    description: >
      委託先に対する監査権が契約で確保され、定期的な監査・モニタリングが
      実施されているか確認する。監査結果に基づく是正要求と
      改善状況のフォローアップ体制を評価する。
    severity: "medium"

  - id: C027
    category: "委託先管理"
    name: "再委託の制限と管理"
    description: >
      再委託の事前承認制が契約で定められ、再委託先の管理責任が
      委託先に課されているか確認する。再委託先一覧の把握、
      多層委託におけるセキュリティ水準の維持も評価対象とする。
    severity: "medium"
